{% extends "base.html" %}

{% block content %}
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header Section -->
        <div class="mb-12">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-bold text-gray-900">Teachers Management</h1>
                <div class="flex space-x-4">
                    <button onclick="window.location.href='{{ url_for('main_routes.teachers') }}'" 
                            class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition-colors duration-200">
                        <i class="fas fa-plus mr-2"></i> Add New Teacher
                    </button>
                </div>
            </div>
        </div>

        <!-- Teachers List -->
        <div class="bg-white rounded-xl card-shadow p-6">
            <!-- Search and Filters -->
            <div class="flex flex-col md:flex-row justify-between items-center mb-6">
                <div class="flex-1">
                    <div class="relative">
                        <input type="text" id="searchInput" 
                               class="w-full md:w-96 px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-blue-500 transition-colors duration-200"
                               placeholder="Search teachers...">
                        <i class="fas fa-search absolute right-3 top-2.5 text-gray-400"></i>
                    </div>
                </div>
                <div class="flex space-x-4 mt-4 md:mt-0">
                    <select id="classFilter" 
                            class="px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-blue-500 transition-colors duration-200">
                        <option value="">All Classes</option>
                        {% for class_name in class_names %}
                            <option value="{{ class_name }}">{{ class_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Teachers Table -->
            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Full Name</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Class</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="teachersTableBody">
                        {% for teacher in teachers %}
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="flex-shrink-0 h-10 w-10">
                                        <img class="h-10 w-10 rounded-full" src="{{ teacher.avatar_url or 'https://ui-avatars.com/api/?name=' + teacher.name }}" alt="{{ teacher.name }}">
                                    </div>
                                    <div class="ml-4">
                                        <div class="text-sm font-medium text-gray-900">{{ teacher.name }}</div>
                                        <div class="text-sm text-gray-500">{{ teacher.email }}</div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm text-gray-900">{{ teacher.email }}</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm text-gray-900">{{ teacher.phone }}</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm text-gray-900">{{ teacher.class_name }}</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <div class="flex space-x-2">
                                    <button onclick="viewTeacher({{ teacher.id }})" 
                                            class="text-blue-600 hover:text-blue-900">
                                        <i class="fas fa-eye"></i> View
                                    </button>
                                    <button onclick="editTeacher({{ teacher.id }})" 
                                            class="text-yellow-600 hover:text-yellow-900">
                                        <i class="fas fa-edit"></i> Edit
                                    </button>
                                    <button onclick="deleteTeacher({{ teacher.id }})" 
                                            class="text-red-600 hover:text-red-900">
                                        <i class="fas fa-trash"></i> Delete
                                    </button>
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Add event listeners for search and filter
        document.getElementById('searchInput').addEventListener('input', function(e) {
            filterTeachers();
        });

        document.getElementById('classFilter').addEventListener('change', function(e) {
            filterTeachers();
        });

        function filterTeachers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const classFilter = document.getElementById('classFilter').value;
            const rows = document.querySelectorAll('#teachersTableBody tr');

            rows.forEach(row => {
                const name = row.querySelector('div.text-sm.font-medium.text-gray-900').textContent.toLowerCase();
                const email = row.querySelector('div.text-sm.text-gray-900').textContent.toLowerCase();
                const phone = row.querySelector('div.text-sm.text-gray-900').textContent.toLowerCase();
                const className = row.querySelector('div.text-sm.text-gray-900').textContent.toLowerCase();

                const matchesSearch = name.includes(searchTerm) || email.includes(searchTerm) || phone.includes(searchTerm);
                const matchesClass = !classFilter || className === classFilter.toLowerCase();

                row.style.display = matchesSearch && matchesClass ? '' : 'none';
            });
        }

        function viewTeacher(id) {
            // Implement view teacher functionality
            console.log('Viewing teacher:', id);
            // TODO: Implement view teacher modal or redirect
        }

        function editTeacher(id) {
            // Implement edit teacher functionality
            console.log('Editing teacher:', id);
            // TODO: Implement edit teacher modal
        }

        function deleteTeacher(id) {
            if (confirm('Are you sure you want to delete this teacher?')) {
                fetch(`/api/teachers/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message === 'Teacher deleted successfully') {
                        location.reload();
                    } else {
                        alert('Failed to delete teacher');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('An error occurred while deleting the teacher');
                });
            }
        }
    </script>
{% endblock %}
